spring.application.name=meu-s.i.m-api
server.port=${SPRING_SERVER_PORT}
spring.threads.virtual.enabled=true
server.servlet.context-path=/api/v1
spring.config.import=optional:file:./env.properties

jwt.public.key=classpath:key/app.pub
jwt.private.key=classpath:key/app.key

turnstile.secret-key=${TURNSTILE_SECRET_KEY}
turnstile.verify-url=${TURNSTILE_VERIFY_URL}

spring.profiles.active=${SPRING_PROFILE}

spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

spring.data.redis.repositories.enabled=false

spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=15000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000