<div class="register-container">
  <aside class="sidebar">
    <h2>Meu S.I.M</h2>
    <p>Crie sua conta</p>
    <div class="circle-bottom"></div>
  </aside>
  
  <main class="content">
    <button class="btn-back" (click)="backToHome()">
      <app-svg-arrow-left color="current" [size]="18"/>
      Voltar ao início
    </button>

    <div class="form-box">
      @switch (step) {
        @case (0) {
          <app-register-step-user 
            (next)="nextStep($event)">
          </app-register-step-user>
        }
        @case (1) { 
          <app-register-step-school
            [isLoading]="isLoading"
            [captchaExecuting]="captchaExecuting"
            (cancel)="backStep()"
            (next)="finish($event)">
          </app-register-step-school>
        }
      }
    </div>
  </main>
</div>
<div id="turnstile-container"></div>
