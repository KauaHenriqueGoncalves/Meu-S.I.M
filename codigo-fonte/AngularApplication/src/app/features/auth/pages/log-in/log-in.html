<div class="login-container">
  <aside class="sidebar">
    <div class="sidebar-info">
      <span class="system-badge">Portal de Acesso</span>
      <h2>Meu S.I.M</h2>
      <p>Acesse a sua conta e tenha o controle.</p>
    </div>
    <div class="circle-bottom"></div>
  </aside>
  
  <main class="content">
    <button class="btn-back" (click)="backToHome()">
      <app-svg-arrow-left color="current" [size]="18"/>
      Voltar ao início
    </button>

    <div class="form-box">
      <app-log-in-user
        [isLoading]="isLoading"
        [captchaExecuting]="captchaExecuting"
        (next)="finish($event)">
      </app-log-in-user>
    </div>
  </main>
</div>
<div id="turnstile-container"></div>
